<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0D0B07"/>

  <!-- Decorative top-left corner pattern -->
  <g opacity="0.3" transform="translate(40, 40)">
    <circle cx="0" cy="0" r="80" fill="none" stroke="#C9A84C" stroke-width="2"/>
    <circle cx="0" cy="0" r="60" fill="none" stroke="#C9A84C" stroke-width="1"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#C9A84C" stroke-width="1"/>
    <!-- Unalome in corner -->
    <path d="M 0 -50 Q -15 -50 -20 -40 Q -25 -30 -25 -15 Q -25 0 -20 10 Q -15 20 0 25"
          fill="none" stroke="#C9A84C" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="25" x2="0" y2="50" stroke="#C9A84C" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Decorative bottom-right corner pattern -->
  <g opacity="0.3" transform="translate(1160, 590)">
    <circle cx="0" cy="0" r="80" fill="none" stroke="#C9A84C" stroke-width="2"/>
    <circle cx="0" cy="0" r="60" fill="none" stroke="#C9A84C" stroke-width="1"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#C9A84C" stroke-width="1"/>
  </g>

  <!-- Vertical center line (subtle) -->
  <line x1="600" y1="50" x2="600" y2="580" stroke="#C9A84C" stroke-width="0.5" opacity="0.2"/>

  <!-- Main content area -->
  <g transform="translate(600, 315)">
    <!-- Thai text: สักยันต์ -->
    <text x="0" y="-80" font-family="Arial, sans-serif" font-size="120" font-weight="bold" text-anchor="middle" fill="#C9A84C" letter-spacing="2">
      สักยันต์
    </text>

    <!-- English title -->
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="72" font-weight="bold" text-anchor="middle" fill="#C9A84C" letter-spacing="4">
      SAK YANT ORACLE
    </text>

    <!-- Subtitle -->
    <text x="0" y="90" font-family="Arial, sans-serif" font-size="36" text-anchor="middle" fill="#C9A84C" opacity="0.85">
      Sacred Tattoo Guidance · 44 Designs · 10 Languages
    </text>

    <!-- Decorative elements -->
    <!-- Top diamond line -->
    <line x1="-250" y1="-110" x2="-180" y2="-110" stroke="#C9A84C" stroke-width="1.5" opacity="0.6"/>
    <g transform="translate(-165, -110)">
      <circle cx="0" cy="0" r="4" fill="#C9A84C" opacity="0.7"/>
    </g>
    <line x1="-150" y1="-110" x2="150" y2="-110" stroke="#C9A84C" stroke-width="1.5" opacity="0.6"/>
    <g transform="translate(165, -110)">
      <circle cx="0" cy="0" r="4" fill="#C9A84C" opacity="0.7"/>
    </g>
    <line x1="180" y1="-110" x2="250" y2="-110" stroke="#C9A84C" stroke-width="1.5" opacity="0.6"/>

    <!-- Bottom decorative line -->
    <line x1="-300" y1="130" x2="300" y2="130" stroke="#C9A84C" stroke-width="1" opacity="0.4"/>

    <!-- Bottom diamond motif -->
    <g transform="translate(0, 160)">
      <!-- Large diamond -->
      <line x1="0" y1="-12" x2="12" y2="0" stroke="#C9A84C" stroke-width="1.5" opacity="0.6"/>
      <line x1="12" y1="0" x2="0" y2="12" stroke="#C9A84C" stroke-width="1.5" opacity="0.6"/>
      <line x1="0" y1="12" x2="-12" y2="0" stroke="#C9A84C" stroke-width="1.5" opacity="0.6"/>
      <line x1="-12" y1="0" x2="0" y2="-12" stroke="#C9A84C" stroke-width="1.5" opacity="0.6"/>
      <!-- Small circles on diamond -->
      <circle cx="0" cy="-12" r="2" fill="#C9A84C" opacity="0.5"/>
      <circle cx="12" cy="0" r="2" fill="#C9A84C" opacity="0.5"/>
      <circle cx="0" cy="12" r="2" fill="#C9A84C" opacity="0.5"/>
      <circle cx="-12" cy="0" r="2" fill="#C9A84C" opacity="0.5"/>
    </g>
  </g>

  <!-- Left side sacred geometry -->
  <g transform="translate(100, 150)" opacity="0.25">
    <!-- Unalome spiral -->
    <path d="M 0 0 Q -15 0 -20 10 Q -25 20 -25 35 Q -25 50 -20 60 Q -15 70 0 75"
          fill="none" stroke="#C9A84C" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="75" x2="0" y2="120" stroke="#C9A84C" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Right side sacred geometry -->
  <g transform="translate(1100, 150)" opacity="0.25">
    <!-- Unalome spiral (mirrored) -->
    <path d="M 0 0 Q 15 0 20 10 Q 25 20 25 35 Q 25 50 20 60 Q 15 70 0 75"
          fill="none" stroke="#C9A84C" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="75" x2="0" y2="120" stroke="#C9A84C" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>