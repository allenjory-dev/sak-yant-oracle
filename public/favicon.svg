<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <circle cx="32" cy="32" r="32" fill="#0D0B07"/>

  <!-- Outer golden ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#C9A84C" stroke-width="1.5"/>

  <!-- Inner decorative circles -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#C9A84C" stroke-width="0.8" opacity="0.6"/>

  <!-- Unalome spiral motif (spiritual symbol - spiral to straight line) -->
  <!-- Spiral section -->
  <path d="M 32 12 Q 28 12 26 14 Q 24 16 24 20 Q 24 24 26 26 Q 28 28 32 28"
        fill="none" stroke="#C9A84C" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Straight line section (representing enlightenment) -->
  <line x1="32" y1="28" x2="32" y2="50" stroke="#C9A84C" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Diamond accent above spiral -->
  <g transform="translate(32, 8)">
    <line x1="0" y1="0" x2="2" y2="2" stroke="#C9A84C" stroke-width="1" stroke-linecap="round"/>
    <line x1="2" y1="2" x2="0" y2="4" stroke="#C9A84C" stroke-width="1" stroke-linecap="round"/>
    <line x1="0" y1="4" x2="-2" y2="2" stroke="#C9A84C" stroke-width="1" stroke-linecap="round"/>
    <line x1="-2" y1="2" x2="0" y2="0" stroke="#C9A84C" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- Decorative side lines (sacred geometry) -->
  <line x1="18" y1="32" x2="24" y2="32" stroke="#C9A84C" stroke-width="0.8" opacity="0.5"/>
  <line x1="40" y1="32" x2="46" y2="32" stroke="#C9A84C" stroke-width="0.8" opacity="0.5"/>

  <!-- Bottom accent -->
  <g transform="translate(32, 52)">
    <circle cx="0" cy="0" r="1.5" fill="#C9A84C" opacity="0.7"/>
  </g>
</svg>